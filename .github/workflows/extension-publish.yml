name: Build & Publish Chrome Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
            npm run build || true
          fi

      - name: Pack extension into ZIP
        run: |
          DIR="dist"
          [ -d "$DIR" ] || DIR="."
          zip -r extension.zip "$DIR" \
            -x "*.git*" "node_modules/*" ".github/*" "*.md"

      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension

      - name: Publish to Chrome Web Store
        uses: fregante/chrome-webstore-upload-action@main
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }} # 这行你之前缺了！
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          zip-path: extension.zip
