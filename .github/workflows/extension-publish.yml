name: Build & Publish Chrome Extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 🔥 直接消除 Node 警告

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies & build
        run: |
          if [ -f package.json ]; then
            npm install
            npm run build --if-present
          fi

      # 🔥 修复嵌套压缩包（正确打包）
      - name: Pack extension correctly
        run: |
          DIR="dist"
          [ -d "$DIR" ] || DIR="."
          cd "$DIR"
          zip -r ../extension.zip . \
            -x "*.git*" "node_modules/*" ".github/*" "*.md" "*.zip"

      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension

      - name: Publish to Chrome Web Store
        uses: fregante/chrome-webstore-upload-action@main
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          zip-path: extension.zip
