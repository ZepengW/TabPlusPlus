name: Build & Publish Chrome Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 有 package.json 才构建
      - name: Install dependencies & build
        run: |
          if [ -f package.json ]; then
            npm install
            npm run build --if-present
          fi

      # 只压缩 1 次
      - name: Pack extension into ZIP
        run: |
          DIR="dist"
          [ -d "$DIR" ] || DIR="."
          zip -j extension.zip "$DIR"/* \
            -x "*.git*" "node_modules/*" ".github/*" "*.md"

      # 上传一次
      - name: Upload extension
        uses: upload-artifact@v4
        with:
          name: extension
          path: extension.zip

  # 发布阶段：直接使用已构建好的 ZIP
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: download-artifact@v4
        with:
          name: extension

      - name: Publish to Chrome Web Store
        uses: fregante/chrome-webstore-upload-action@main
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          zip-path: extension.zip
