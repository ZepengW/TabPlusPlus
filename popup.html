<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabPlusPlus</title>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <header class="popup-header">
    <div class="popup-logo">
      <div class="logo-icon">T+</div>
      <span class="logo-text">TabPlusPlus</span>
    </div>
  </header>

  <!-- Stats grid -->
  <section class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statTabs">–</div>
      <div class="stat-label" data-i18n="popup_stat_tabs">Tabs</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statWindows">–</div>
      <div class="stat-label" data-i18n="popup_stat_windows">Windows</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statBookmarks">–</div>
      <div class="stat-label" data-i18n="popup_stat_bookmarks">Bookmarks</div>
    </div>
  </section>

  <!-- Quick actions -->
  <section class="section">
    <h2 class="section-title" data-i18n="popup_quick_actions">Quick Actions</h2>
    <div class="action-grid">
      <button class="action-btn primary" id="btnOpenPanel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        <span data-i18n="popup_open_panel">Open Side Panel</span>
      </button>
      <button class="action-btn" id="btnNewTab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span data-i18n="popup_new_tab">New Tab</span>
      </button>
      <button class="action-btn danger" id="btnCloseDupes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span data-i18n="popup_close_dupes">Close Dupes</span>
      </button>
      <button class="action-btn accent" id="btnSaveSession">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span data-i18n="popup_save_session">Save Session</span>
      </button>
    </div>
  </section>

  <!-- Recent sessions -->
  <section class="section">
    <h2 class="section-title" data-i18n="popup_recent_sessions">Recent Sessions</h2>
    <div id="sessionList" class="session-list">
      <p class="empty-msg" data-i18n="popup_no_sessions">No saved sessions yet.</p>
    </div>
  </section>

  <!-- Toast -->
  <div class="toast-wrap" id="toastWrap"></div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
